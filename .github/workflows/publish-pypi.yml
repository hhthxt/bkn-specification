# Publish Python sdist + wheel to PyPI.
#
# Secret: PYPI_API_TOKEN — PyPI API token with "Upload packages" scope (pypi.org → Account → API tokens).
#
# Manual run: optional input dry_run — build sdist/wheel only, do not upload.

name: Publish Python (PyPI)

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Build only; do not upload to PyPI"
        required: false
        default: false
        type: boolean
  push:
    tags:
      - "python-v*"

permissions:
  contents: read

jobs:
  publish:
    name: PyPI package
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk/python

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build
        run: pip install "build>=1.0.0"

      - name: Build sdist and wheel
        run: python -m build --outdir dist .

      - name: Dry-run — list artifacts
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run }}
        run: ls -la dist/

      - name: Publish to PyPI
        if: ${{ !((github.event_name == 'workflow_dispatch') && (inputs.dry_run == true)) }}
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: sdk/python/dist/
          user: __token__
          password: ${{ secrets.PYPI_API_TOKEN }}
