# Publish TypeScript package to npmjs (@kweaver-ai/bkn).
#
# Secrets: NPM_TOKEN — npm "Granular Access Token" or "Automation" token with publish scope
#   for the @kweaver-ai scope (npmjs.com → Access Tokens).
#
# Requires npm org @kweaver-ai to exist and grant publish rights to the token.

name: Publish npm

on:
  workflow_dispatch:
  push:
    tags:
      - "npm-v*"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish to npmjs
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk/typescript

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Publish
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
