# Publish TypeScript package to npmjs (@kweaver-ai/bkn).
#
# Secrets: NPM_TOKEN — npm "Granular Access Token" or "Automation" token with publish scope
#   for the @kweaver-ai scope (npmjs.com → Access Tokens).
#
# Requires npm org @kweaver-ai to exist and grant publish rights to the token.
#
# Manual run: optional input dry_run — build and test only; no npm publish (uses npm pack --dry-run).

name: Publish npm

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Build/test only; do not publish to npm"
        required: false
        default: false
        type: boolean
  push:
    tags:
      - "npm-v*"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: npm package
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk/typescript

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Publish (dry-run)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run }}
        run: npm pack --dry-run

      - name: Publish
        if: ${{ !((github.event_name == 'workflow_dispatch') && (inputs.dry_run == true)) }}
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
